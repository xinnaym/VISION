<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISION | Админ-панель</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="shortcut icon" href="../assets/img/favico/V.svg" type="image/x-icon">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">VISION.</div>
            
            <nav class="admin-nav">
                <a href="#" class="admin-nav-item active" data-page="products">
                    Товары
                </a>
                <a href="#" class="admin-nav-item" data-page="orders">
                    Заказы
                    <span class="admin-badge">0</span>
                </a>
                <a href="#" class="admin-nav-item" data-page="users">
                    Пользователи
                </a>
                <a href="../index.html" class="admin-nav-item">
                    На сайт
                </a>
            </nav>

            <div class="admin-sidebar-footer">
                <a href="#" class="admin-nav-item logout" id="logoutBtn">
                    Выйти
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Header -->
            <header class="admin-header">
                <h1 class="admin-title">Управление товарами</h1>
                <div class="admin-header-right">
                    <button class="admin-btn admin-btn-primary" id="addProductBtn">
                        <span>+</span> Добавить товар
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="admin-filters">
                <div class="admin-search">
                    <input type="text" placeholder="Поиск товаров..." class="admin-input" id="searchInput">
                </div>
                <select class="admin-select" id="categoryFilter">
                    <option value="">Все категории</option>
                    <option value="Клавиатуры">Клавиатуры</option>
                    <option value="Мыши">Мыши</option>
                    <option value="Наушники">Наушники</option>
                    <option value="Аксессуары">Аксессуары</option>
                </select>
            </div>

            <!-- Products Table -->
            <div class="admin-content">
                <div class="admin-table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Фото</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Бренд</th>
                                <th>Цена</th>
                                <th>Наличие</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="admin-pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- Modal: Add/Edit Product -->
    <div class="admin-modal" id="productModal">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h2 id="modalTitle">Добавить товар</h2>
                <button class="admin-modal-close" id="closeModal">&times;</button>
            </div>

            <form class="admin-form" id="productForm">
                <input type="hidden" id="productId">

                <div class="form-row">
                    <div class="form-group">
                        <label>Название товара</label>
                        <input type="text" class="admin-input" id="productName" placeholder="Например: AULA F75" required>
                    </div>
                    <div class="form-group">
                        <label>Бренд</label>
                        <input type="text" class="admin-input" id="productBrand" placeholder="Например: AULA" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Категория</label>
                        <select class="admin-select" id="productCategory" required>
                            <option value="">Выберите категорию</option>
                            <option value="Клавиатуры">Клавиатуры</option>
                            <option value="Мыши">Мыши</option>
                            <option value="Наушники">Наушники</option>
                            <option value="Аксессуары">Аксессуары</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Цена (₽)</label>
                        <input type="number" class="admin-input" id="productPrice" placeholder="4399" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Старая цена (₽)</label>
                        <input type="number" class="admin-input" id="productOldPrice" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Рейтинг</label>
                        <input type="number" step="0.1" min="0" max="5" class="admin-input" id="productRating" placeholder="4.8" value="4.5">
                    </div>
                </div>

                <div class="form-group">
                    <label>Наличие</label>
                    <select class="admin-select" id="productInStock" required>
                        <option value="true">В наличии</option>
                        <option value="false">Нет в наличии</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Характеристики</label>
                    <div id="specsContainer"></div>
                    <button type="button" class="admin-btn admin-btn-outline" id="addSpecBtn" style="margin-top: 0.5rem;">+ Добавить характеристику</button>
                </div>

                <div class="form-group">
                    <label>Описание</label>
                    <textarea class="admin-input admin-textarea" id="productDescription" rows="4" placeholder="Опишите товар..."></textarea>
                </div>

                <div class="admin-form-actions">
                    <button type="button" class="admin-btn admin-btn-outline" id="cancelBtn">Отмена</button>
                    <button type="submit" class="admin-btn admin-btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Delete Confirmation -->
    <div class="admin-modal" id="deleteModal">
        <div class="admin-modal-content admin-modal-small">
            <div class="admin-modal-header">
                <h2>Удаление товара</h2>
                <button class="admin-modal-close" id="closeDeleteModal">&times;</button>
            </div>

            <div class="admin-delete-content">
                <p>Вы уверены, что хотите удалить этот товар?</p>
                <p class="admin-delete-warning">Это действие нельзя отменить</p>
            </div>

            <div class="admin-form-actions">
                <button class="admin-btn admin-btn-outline" id="cancelDeleteBtn">Отмена</button>
                <button class="admin-btn admin-btn-danger" id="confirmDeleteBtn">Удалить</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/admin.js"></script>
    <script>
        // Обработка выхода
        document.getElementById('logoutBtn')?.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('adminToken');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
